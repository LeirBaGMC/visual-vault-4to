<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Visual Vault Corp: Plataforma segura y ética para la curaduría, almacenamiento y descubrimiento de contenido multimedia estilo Pinterest."
    />
    <title>Visual Vault Corp - Explorar</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search"
    />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/index.css" />
    <script src="assets/js/api.js" defer></script>
    <script src="assets/js/index.js" defer></script>
  </head>
  <body>
    <header class="main-header">
      <div class="header-container">
        <a
          href="index.html"
          class="logo-area"
          aria-label="Volver a la página principal"
        >
          <img src="#" alt="Logotipo de Visual Vault" class="logo-img" />
          <span class="logo-text">Visual Vault</span>
        </a>

        <div class="search-area">
          <form id="search-form" class="search-form" role="search">
            <span class="material-symbols-outlined"> search </span>
            <input
              type="search"
              id="search-input"
              placeholder="Buscar ideas, tags, tableros..."
              aria-label="Buscador de contenido multimedia"
            />
          </form>
        </div>

        <nav class="auth-navigation" aria-label="Navegación de cuenta">
          <ul id="unauthenticated-menu" class="auth-buttons-list">
            <li>
              <a href="login.html" class="btn btn-secondary">Iniciar sesión</a>
            </li>
            <li>
              <a href="register.html" class="btn btn-primary">Registrarse</a>
            </li>
          </ul>
          <div
            id="authenticated-menu"
            class="user-profile-menu hidden"
            aria-hidden="true"
          >
            <a
              href="usuario.html"
              class="avatar-link"
              aria-label="Ir a tu perfil de usuario"
            >
              <img
                id="header-user-avatar"
                src="#"
                alt="Tu avatar de perfil"
                class="profile-avatar-thumb"
              />
            </a>
            <button
              id="logout-button"
              class="btn btn-danger-sm"
              aria-label="Cerrar sesión de forma segura"
            >
              Salir
            </button>
          </div>
        </nav>
      </div>
    </header>

    <nav class="categories-nav" aria-label="Filtrado rápido por Categorías">
      <p class="categories-title" id="category-heading">
        Explora por categoría:
      </p>
      <ul
        id="categories-list"
        class="categories-list"
        aria-labelledby="category-heading"
      >
        <li>
          <a
            href="#"
            class="category-chip active"
            data-category="all"
            aria-current="page"
            >Todos</a
          >
        </li>
        <li>
          <a href="#" class="category-chip" data-category="Animals">Animals</a>
        </li>
        <li><a href="#" class="category-chip" data-category="Art">Art</a></li>
        <li>
          <a href="#" class="category-chip" data-category="Beauty">Beauty</a>
        </li>
        <li>
          <a href="#" class="category-chip" data-category="Design">Design</a>
        </li>
        <li>
          <a href="#" class="category-chip" data-category="Food"
            >Food & Drink</a
          >
        </li>
      </ul>
    </nav>

    <main class="main-content">
      <section class="feed-section" aria-label="Feed principal de imágenes">
        <div
          id="feed-grid"
          class="feed-grid"
          aria-live="polite"
          aria-atomic="false"
        >
          <p class="loader-placeholder" aria-busy="true">Cargando ...</p>
        </div>
      </section>
    </main>

    <footer class="main-footer" role="contentinfo">
      <div class="footer-container">
        <p>&copy; 2026 Visual Vault Corp.</p>
      </div>
    </footer>
  </body>
</html>
