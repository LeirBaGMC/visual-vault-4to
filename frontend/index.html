<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Visual Vault Corp: Plataforma segura y ética para la curaduría, almacenamiento y descubrimiento de contenido multimedia estilo Pinterest."
    />
    <title>Visual Vault Corp - Explorar</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search"
    />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/index.css" />
    <script src="assets/js/VanillaJS/api.js" defer></script>
    <script src="assets/js/VanillaJS/index.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="main-header">
      <div class="header-container">
        <a
          href="index.html"
          class="logo-area"
          aria-label="Volver a la página principal"
        >
          <img src="#" alt="Logotipo de Visual Vault" class="logo-img" />
          <span class="logo-text">Visual Vault</span>
        </a>

        <div class="search-area">
          <form id="search-form" class="search-form" role="search">
            <span class="material-symbols-outlined"> search </span>
            <input
              type="search"
              id="search-input"
              placeholder="Buscar ideas, tags, tableros..."
              aria-label="Buscador de contenido multimedia"
            />
          </form>
        </div>

        <nav class="auth-navigation" aria-label="Navegación de cuenta">
          <ul id="unauthenticated-menu" class="auth-buttons-list">
            <li>
              <a href="login.html" class="btn btn-secondary">Iniciar sesión</a>
            </li>
            <li>
              <a href="register.html" class="btn btn-primary">Registrarse</a>
            </li>
          </ul>
          <div
            id="authenticated-menu"
            class="user-profile-menu hidden"
            aria-hidden="true"
          >
            <a
              href="usuario.html"
              class="avatar-link"
              aria-label="Ir a tu perfil de usuario"
            >
              <img
                id="header-user-avatar"
                src="#"
                alt="Tu avatar de perfil"
                class="profile-avatar-thumb"
              />
            </a>
            <button
              id="logout-button"
              class="btn btn-danger-sm"
              aria-label="Cerrar sesión de forma segura"
            >
              Salir
            </button>
          </div>
        </nav>
      </div>
    </header>

    <main class="main-content" id="react-feed-root">
      <p
        class="loader-placeholder"
        aria-busy="true"
        style="text-align: center; margin-top: 50px"
      >
        Despertando el motor de Visual Vault...
      </p>
    </main>
    <footer class="main-footer" role="contentinfo">
      <div class="footer-container">
        <p>&copy; 2026 Visual Vault Corp.</p>
      </div>
    </footer>

    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="assets/js/ReactJSX/Feed.jsx"></script>
  </body>
</html>
