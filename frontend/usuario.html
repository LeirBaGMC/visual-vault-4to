<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Perfil de usuario en Visual Vault Corp. Explora los tableros y pines creados y guardados por nuestra comunidad."
    />
    <title>Visual Vault - Mi Perfil</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search"
    />
    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/usuario.css" />
    <script src="assets/js/api.js" defer></script>
    <script src="assets/js/usuario.js" defer></script>
  </head>
  <body>
    <header class="main-header">
      <div class="header-container">
        <a
          href="index.html"
          class="logo-area"
          aria-label="Ir a la página principal"
        >
          <img
            src="https://visual-vault-bucket.s3.us-east-1.amazonaws.com/static/system/logo_vv_technical_blue.svg"
            alt="Logotipo de Visual Vault"
            class="logo-img"
          />
          <span class="logo-text">Visual Vault</span>
        </a>
        <div class="search-area">
          <form
            id="header-search-form"
            class="search-form"
            action="index.html"
            role="search"
          >
            <span
              class="material-symbols-outlined search-icon"
              aria-hidden="true"
              >search</span
            >
            <input
              type="search"
              placeholder="Buscar en mis tableros y pines..."
              aria-label="Buscador en el perfil"
            />
          </form>
        </div>
        <nav
          class="auth-navigation"
          aria-label="Navegación general y de sesión"
        >
          <ul class="auth-buttons-list">
            <li>
              <a href="index.html" class="btn btn-secondary-sm">Explorar</a>
            </li>
            <li>
              <button id="logout-button" class="btn btn-danger-sm">
                Cerrar sesión
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <section
        class="profile-card-section"
        aria-label="Información del usuario"
      >
        <div class="profile-card-content">
          <div class="profile-avatar-container">
            <img
              id="user-profile-avatar"
              src="#"
              alt="Foto de perfil del usuario"
              class="profile-avatar-large"
            />
          </div>
          <h1 id="user-full-name" class="user-full-name" aria-live="polite">
            Cargando nombre...
          </h1>
          <p id="user-nickname" class="user-nickname">@cargando_usuario</p>

          <div class="user-meta-badges">
            <span id="user-role-badge" class="badge">Miembro</span>
            <span id="user-age-badge" class="badge">Edad: -- años</span>
          </div>
        </div>
      </section>

      <section
        class="profile-navigation-tabs"
        aria-label="Navegación de contenido de usuario"
      >
        <ul class="tabs-list" role="tablist">
          <li role="presentation">
            <a
              href="#"
              class="tab-btn active"
              id="tab-created"
              role="tab"
              aria-selected="true"
              aria-controls="user-pins-grid"
              >Creados</a
            >
          </li>
          <li role="presentation">
            <a
              href="#"
              class="tab-btn"
              id="tab-saved"
              role="tab"
              aria-selected="false"
              >Tableros Guardados</a
            >
          </li>
        </ul>
      </section>

      <section
        class="user-gallery-section"
        aria-label="Galería de publicaciones"
      >
        <div
          id="user-pins-grid"
          class="feed-grid"
          role="tabpanel"
          aria-labelledby="tab-created"
          aria-live="polite"
        >
          <p class="loader-placeholder" aria-busy="true">
            Cargando tus pines e ideas...
          </p>
        </div>
      </section>
    </main>

    <footer class="main-footer" role="contentinfo">
      <div class="footer-container">
        <p>&copy; 2026 Visual Vault Corp.</p>
      </div>
    </footer>
  </body>
</html>
