<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Vault - Iniciar Sesión</title>

    <link rel="stylesheet" href="assets/css/global.css" />
    <link rel="stylesheet" href="assets/css/register.css" />
  </head>
  <body>
    <header class="auth-header">
      <a href="index.html" class="logo-area" aria-label="Ir al inicio">
        <img src="#" alt="Logotipo de Visual Vault" class="logo-img-auth" />
        <span class="logo-text">Visual Vault</span>
      </a>
    </header>

    <main class="auth-main-container">
      <section class="auth-card-section">
        <article class="auth-card">
          <h1 id="register-title">Inicia sesión para ver más</h1>
          <p class="auth-subtitle">
            Accede a tu bóveda personal en Visual Vault
          </p>

          <div id="react-login-root"></div>

          <div
            class="auth-card-footer"
            style="text-align: center; margin-top: 20px"
          >
            <p>
              ¿Aún no estás en Visual Vault?
              <a
                href="register.html"
                class="auth-link"
                style="color: var(--color-primary); font-weight: 600"
                >Regístrate</a
              >
            </p>
          </div>
        </article>
      </section>
    </main>

    <footer class="main-footer" role="contentinfo">
      <div class="footer-container">
        <p>&copy; 2026 Visual Vault Corp.</p>
      </div>
    </footer>

    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" src="assets/js/ReactJSX/Login.jsx"></script>
  </body>
</html>
