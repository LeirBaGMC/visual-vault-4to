<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Visual Vault — Bóveda social de referencias visuales: organiza, comparte y descubre inspiración en tableros y pines. Almacenamiento en AWS S3."
    />
    <meta name="theme-color" content="#090B0E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fuentes en carga ASÍNCRONA (fuera del render crítico) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
      />
    </noscript>
    <title>Visual Vault — Tu bóveda de referencias visuales</title>
    <style>
      /* Pantalla de carga inicial (visible hasta que React monta) */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #090b0e;
        z-index: 9999;
      }
      #app-loader .ring {
        width: 44px;
        height: 44px;
        border: 4px solid #27272a;
        border-top-color: #e60023;
        border-radius: 50%;
        animation: vv-spin 0.8s linear infinite;
      }
      @keyframes vv-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader"><div class="ring"></div></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
